<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>This or That - Image Ranker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
    :root {
        --supabase-green: #3ecf8e;
        --bg-dark: #121212;
    }

    body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-dark);
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
    }

    h1 { margin-bottom: 20px; font-weight: 300; }

    .container {
        display: flex;
        gap: 20px;
        width: 90%;
        justify-content: center;
        align-items: center;
    }

    .card {
        cursor: pointer;
        transition: transform 0.2s;
        flex: 1;
        /* Lower this number to make the images even smaller */
        max-width: 400px; 
    }

    .card:hover {
        transform: scale(1.05);
    }

    img {
        width: 100%;
        /* Adjusted height to be smaller (50% of screen instead of 70%) */
        height: 50vh; 
        /* 'contain' ensures the WHOLE image is seen without cropping */
        object-fit: contain; 
        background-color: #1a1a1a; /* Adds a subtle dark background for thin images */
        border-radius: 15px;
        border: 3px solid transparent;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        transition: border-color 0.2s;
    }

    .card:hover img {
        border-color: var(--supabase-green);
    }

    #loading {
        position: fixed;
        inset: 0;
        background: var(--bg-dark);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 100;
    }

    .hidden { display: none !important; }
</style>
</head>
<body>

    <div id="loading">Connecting to Supabase...</div>

    <h1>Who is hot and who is not ?</h1>

    <div class="container">
        <div class="card" onclick="castVote('left')">
            <img id="img-left" src="" alt="Loading...">
        </div>
        <div class="card" onclick="castVote('right')">
            <img id="img-right" src="" alt="Loading...">
        </div>
    </div>

    <script>
        // 1. CONFIGURATION (Fixed URL and Var Name)
        const SB_URL = 'https://lutdvsfvxsfcfvzzmaox.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx1dGR2c2Z2eHNmY2Z2enptYW94Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDgxNDMsImV4cCI6MjA4OTc4NDE0M30.Z1PQwd9n0RLer2cCjHuwcGpzw-6ZR-7KoyJk4Q2896M';
        
        // We call it 'sb' so it doesn't clash with the global 'supabase' object
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let allImages = [];
        let leftImgData, rightImgData;

        // 2. FETCH DATA
        async function init() {
            try {
                const { data, error } = await sb
                    .from('images')
                    .select('id, image_url');

                if (error) throw error;

                if (!data || data.length < 2) {
                    document.getElementById('loading').innerText = "Not enough images found in database.";
                    return;
                }

                allImages = data;
                document.getElementById('loading').classList.add('hidden');
                showNewPair();
            } catch (err) {
                console.error("Initialization error:", err);
                document.getElementById('loading').innerText = "Database Error. Check Console.";
            }
        }

        // 3. SHOW RANDOM PAIR
        function showNewPair() {
            let idx1 = Math.floor(Math.random() * allImages.length);
            let idx2 = Math.floor(Math.random() * allImages.length);

            while (idx1 === idx2) {
                idx2 = Math.floor(Math.random() * allImages.length);
            }

            leftImgData = allImages[idx1];
            rightImgData = allImages[idx2];

            document.getElementById('img-left').src = leftImgData.image_url;
            document.getElementById('img-right').src = rightImgData.image_url;
        }

        // 4. VOTE LOGIC
        async function castVote(side) {
            const winnerId = (side === 'left') ? leftImgData.id : rightImgData.id;

            // Move immediately for speed
            showNewPair();

            // Background update
            const { error } = await sb.rpc('increment_vote', { row_id: winnerId });
            
            if (error) {
                console.error("Vote failed to sync:", error);
            }
        }

        init();
    </script>
</body>
</html>
